<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For RANI ❤️</title>

<style>
body {
  margin:0;
  font-family: Arial;
  text-align:center;
  color:white;
  background:black;
}

.container {
  margin-top:60px;
}

img {
  width:260px;
  border-radius:15px;
  box-shadow:0 0 15px rgba(0,0,0,0.6);
}

button {
  margin-top:20px;
  padding:10px 20px;
  font-size:16px;
  border:none;
  border-radius:10px;
  background:#ff4d6d;
  color:white;
}

h1 {
  margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<h1>For RANI ❤️</h1>

<!-- Start Image -->
<img id="img" src="Snapchat-1876535519.jpg">

<br>

<button onclick="next()">Next ❤️</button>

</div>

<!-- 🎵 Music -->
<audio id="music" src="Ban Ja Rani Tumhari Sulu 128 Kbps.mp3"></audio>

<script>
let images = [
"Snapchat-1876535519.jpg",
"Videoshot_20260310_141541.jpg",
"Screenshot_20251001-162715.png",
"Screenshot_20250809-110029.png",
"Screenshot_20251020-102456.png",
"Screenshot_20251112-123501.png"
];

let i = 0;

function next(){
  i++;
  if(i < images.length){
    document.getElementById("img").src = images[i];
  }

  // music play on first click
  document.getElementById("music").play();
}
</script>

</body>
</html>
